name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Run tests
        run: python -m unittest discover -s tests

  build:
    name: build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install build dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller --noconfirm --clean --onefile --windowed --name apk-extract-gui apk_extract_gui/__main__.py

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact
          Copy-Item dist\apk-extract-gui.exe artifact\
          Copy-Item README.md artifact\
          Compress-Archive -Path artifact\* -DestinationPath apk-extract-gui-windows-x86_64.zip

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact
          cp dist/apk-extract-gui artifact/
          cp README.md artifact/
          tar -czf apk-extract-gui-linux-x86_64.tar.gz -C artifact .

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: apk-extract-gui-windows-x86_64
          path: apk-extract-gui-windows-x86_64.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: apk-extract-gui-linux-x86_64
          path: apk-extract-gui-linux-x86_64.tar.gz

  release:
    name: release
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find release-artifacts -maxdepth 2 -type f -print
          gh release create "${GITHUB_REF_NAME}" $(find release-artifacts -maxdepth 2 -type f) --title "${GITHUB_REF_NAME}" --notes "自动构建版本 ${GITHUB_REF_NAME}" --verify-tag

