name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build portable app
        run: npm run build

      - name: Package Windows portable artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact
          Copy-Item src-tauri\target\release\apk-extract-gui.exe artifact\
          Copy-Item README.md artifact\
          Compress-Archive -Path artifact\* -DestinationPath apk-extract-gui-windows-portable-x86_64.zip

      - name: Package Linux portable artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact
          cp src-tauri/target/release/apk-extract-gui artifact/
          cp README.md artifact/
          chmod +x artifact/apk-extract-gui
          tar -czf apk-extract-gui-linux-portable-x86_64.tar.gz -C artifact .

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: apk-extract-gui-windows-portable-x86_64
          path: apk-extract-gui-windows-portable-x86_64.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: apk-extract-gui-linux-portable-x86_64
          path: apk-extract-gui-linux-portable-x86_64.tar.gz

  release:
    name: release
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(find release-artifacts -maxdepth 2 -type f -print)
          printf '%s\n' "$files"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" $files --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" $files --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --notes "自动构建版本 ${GITHUB_REF_NAME}" --verify-tag
          fi
